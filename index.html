<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oráculo del Sabor - Cocina Griega</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="grecia.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-greek-blue sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#" onclick="window.location.reload()">El Oráculo <span style="color: #c5a059;">del Sabor</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="#" onclick="window.renderLanding()">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="window.renderMenuPublico()">Menú</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="window.renderUbicacion()">Ubicación</a></li>
                        <li class="nav-item"><a class="nav-link" href="#" onclick="window.showAuth()">Reservar</a></li>
                    </ul>
                    <button id="btn-logout" class="btn btn-outline-gold btn-sm ms-lg-3 d-none">Salir</button>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-content" class="flex-grow-1">
        </main>

    <div class="modal fade" id="modalCantidad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-0" style="border: 1px solid #c5a059;">
                <div class="modal-body text-center p-4">
                    <h4 id="cant-nombre-item" style="color: #c5a059;"></h4>
                    <img id="cant-img-item" src="" class="img-fluid rounded my-3 border-gold" style="max-height: 180px; width: 100%; object-fit: cover;">
                    <div class="d-flex justify-content-center align-items-center gap-4">
                        <button class="btn btn-outline-gold rounded-circle" onclick="window.modCant(-1)" style="width: 45px; height: 45px;">-</button>
                        <h1 id="cant-num" class="m-0 fw-bold" style="color: #ffca28; min-width: 60px;">1</h1>
                        <button class="btn btn-outline-gold rounded-circle" onclick="window.modCant(1)" style="width: 45px; height: 45px;">+</button>
                    </div>
                    <button class="btn btn-primary w-100 mt-4" onclick="window.confirmarAgregado()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-center" style="border-top: 1px solid #c5a059;">
        <div class="container text-muted small">© 2026 El Oráculo del Sabor - Ecatepec, MX</div>
    </footer>

    <script src="bootstrap.bundle.js"></script>
    <script type="module" src="grecia.js"></script>
</body>
</html>
