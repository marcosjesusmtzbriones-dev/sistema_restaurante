<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oraculo del Sabor</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="grecia.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-greek-blue sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">El Oráculo <span style="color: #c5a059;">del Sabor</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto" id="nav-items"></ul>
                    <button id="btn-logout" class="btn btn-outline-gold btn-sm ms-lg-3 d-none">Salir</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <section id="section-auth" class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="glass-card p-4">
                    <h3 class="text-center mb-4" style="color: #c5a059;">Acceso Premium</h3>
                    <input type="email" id="email" class="form-control mb-3" placeholder="Correo">
                    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">
                    <button id="btn-login" class="btn btn-primary w-100">Entrar</button>
                </div>
            </div>
        </section>

        <section id="section-app" class="d-none">
            <div id="panel-bienvenida" class="mb-4 text-center"></div>
            <div id="render-area" class="row g-4"></div>
        </section>
    </main>

    <div class="modal fade" id="modalCantidad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-card p-0" style="border: 1px solid #c5a059;">
                <div class="modal-body text-center p-4">
                    <h4 id="cant-nombre-item" style="color: #c5a059;"></h4>
                    <img id="cant-img-item" src="" class="img-fluid rounded my-3 border-gold" style="max-height: 180px; width: 100%; object-fit: cover;">
                    <p id="cant-desc-item" class="small text-light mb-4"></p>
                    <div class="d-flex justify-content-center align-items-center gap-4">
                        <button class="btn btn-outline-gold rounded-circle" onclick="window.modCant(-1)" style="width: 45px; height: 45px;">-</button>
                        <h2 id="cant-num" class="m-0">1</h2>
                        <button class="btn btn-outline-gold rounded-circle" onclick="window.modCant(1)" style="width: 45px; height: 45px;">+</button>
                    </div>
                    <button class="btn btn-primary w-100 mt-4" onclick="window.confirmarAgregado()">Confirmar Pedido</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTicket" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-sm">
            <div class="modal-content bg-light text-dark p-4" style="font-family: 'Courier New', Courier, monospace;">
                <div class="text-center">
                    <h5 class="fw-bold">EL ORÁCULO DEL SABOR</h5>
                    <p class="small">TICKET DE CONSUMO</p>
                    <hr style="border-top: 2px dashed #000;">
                </div>
                <div id="ticket-detalle"></div>
                <hr style="border-top: 2px dashed #000;">
                <button type="button" class="btn btn-dark btn-sm w-100" data-bs-dismiss="modal" onclick="window.limpiarTodo()">Cerrar y Limpiar Mesa</button>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-center" style="border-top: 1px solid #c5a059;">
        <div class="container text-muted small">© 2026 El Oráculo del Sabor</div>
    </footer>

    <script src="bootstrap.bundle.js"></script>
    <script type="module" src="grecia.js"></script>
</body>
</html>
