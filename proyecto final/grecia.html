<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Oraculo del Sabor</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/grecia.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-greek-blue sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">El Oraculo <span class="text-info">del Sabor</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto" id="nav-items"></ul>
                    <button id="btn-logout" class="btn btn-outline-light btn-sm ms-lg-3 d-none">Salir</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <section id="section-auth" class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="glass-card p-4">
                    <h3 class="text-center mb-4">Acceso</h3>
                    <input type="email" id="email" class="form-control mb-3" placeholder="Correo">
                    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">
                    <button id="btn-login" class="btn btn-primary w-100">Entrar</button>
                </div>
            </div>
        </section>

        <section id="section-app" class="d-none">
            <div id="panel-bienvenida" class="mb-4 text-center"></div>
            <div id="render-area" class="row g-4"></div>
        </section>
    </main>

    <div class="modal fade" id="modalTicket" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-sm">
            <div class="modal-content bg-light text-dark p-4" style="font-family: monospace;">
                <div class="text-center">
                    <h5 class="fw-bold">El Oraculo del Sabor</h5>
                    <p class="small">Ticket de Consumo</p>
                    <hr>
                </div>
                <div id="ticket-detalle"></div>
                <hr>
                <div class="text-center">
                    <p class="small">Toma foto a tu ticket</p>
                    <button type="button" class="btn btn-dark btn-sm w-100" data-bs-dismiss="modal" onclick="window.limpiarTodo()">Finalizar y Limpiar Mesa</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-dark text-center">
        <div class="container text-muted small">© 2026 Restaurante Griego</div>
    </footer>

    <script src="js/bootstrap.bundle.js"></script>
    <script type="module" src="js/grecia.js"></script>
</body>
</html>
